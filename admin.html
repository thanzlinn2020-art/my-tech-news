<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Admin - Myanmar Tech News</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #3b82f6; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body class="container section">
    <h1>📝 Admin Panel</h1>
    <div class="admin-box">
        <h2 id="formTitle">သတင်းအသစ်ထည့်ရန်</h2>
        <input type="hidden" id="newsId">
        <input type="text" id="title" placeholder="ခေါင်းစဉ်">
        <textarea id="summary" placeholder="အကျဉ်းချုပ်"></textarea>
        <select id="category">
    <option value="နိုင်ငံတကာ">🌍 နိုင်ငံတကာ သတင်း</option>
    <option value="ပြည်တွင်း">🇲🇲 မြန်မာနိုင်ငံပြည်တွင်း သတင်း</option>
    <option value="ဖုန်း">📱 ဖုန်း သတင်း</option>
    <option value="AI">🤖 AI နည်းပညာသတင်း</option>
    <option value="အားကစား">⚽ အားကစားသတင်း</option>
    <option value="စီးပွားရေး">📈 စီးပွားရေးသတင်း</option>
    <option value="စျေးနှုန်း">💰 ရွှေ၊ ငွေစျေးနှုန်း သတင်း</option>
</select>

        <select id="reliability">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>
        <button class="btn-add" onclick="saveNews()">သိမ်းမည်</button>
    </div>
    <table>
        <thead><tr><th>Title</th><th>Action</th></tr></thead>
        <tbody id="newsListBody"></tbody>
    </table>
    <script src="admin.js"></script>
</body>
</html>
