<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#f1f5f9;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{background:#0f172a;color:#fff;padding:20px;border-radius:16px;margin-bottom:30px;display:flex;justify-content:space-between;align-items:center}
        .header a{color:#3b82f6;background:#fff;padding:8px16px;border-radius:8px;text-decoration:none}
        .tabs{display:flex;gap:10px;margin-bottom:20px}
        .tab{background:#fff;border:none;padding:12px24px;border-radius:12px;cursor:pointer;font-weight:600}
        .tab.active{background:#3b82f6;color:#fff}
        .panel{background:#fff;border-radius:16px;padding:25px;margin-bottom:20px}
        input,textarea,select{width:100%;padding:12px;margin:10px 0;border:1px solid #cbd5e1;border-radius:8px}
        button{padding:10px20px;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin-right:10px}
        .btn-primary{background:#3b82f6;color:#fff}
        .btn-danger{background:#ef4444;color:#fff}
        .btn-success{background:#10b981;color:#fff}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0}
        .hidden{display:none}
        .loading{text-align:center;padding:20px;color:#3b82f6}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👑 Admin Panel</h1>
        <a href="index.html">🏠 Frontend</a>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="showTab('add')">➕ Add News</button>
        <button class="tab" onclick="showTab('import')">🤖 Auto Import</button>
        <button class="tab" onclick="showTab('list')">📋 News List</button>
    </div>
    
    <div id="addPanel" class="panel">
        <h2>Add New News</h2>
        <input type="text" id="title" placeholder="Title *">
        <textarea id="summary" rows="2" placeholder="Summary *"></textarea>
        <textarea id="content" rows="4" placeholder="Full Content"></textarea>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <input type="text" id="category" placeholder="Category (AI, 5G, Mobile)">
            <input type="text" id="source" placeholder="Source">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <input type="text" id="image_url" placeholder="Image URL">
            <select id="reliability">
                <option value="high">High Reliability</option>
                <option value="medium" selected>Medium Reliability</option>
                <option value="low">Low Reliability</option>
            </select>
        </div>
        <button class="btn-primary" onclick="saveNews()">💾 Save</button>
        <button onclick="clearForm()">Clear</button>
    </div>
    
    <div id="importPanel" class="panel hidden">
        <h2>Auto Import</h2>
        <input type="url" id="newsUrl" placeholder="https://www.bbc.com/burmese/...">
        <button class="btn-primary" onclick="fetchNews()">🔍 Fetch</button>
        <div id="fetchLoading" class="loading hidden">Loading...</div>
        <div id="previewDiv" class="hidden" style="margin-top:20px;padding:15px;background:#f8fafc;border-radius:12px"></div>
    </div>
    
    <div id="listPanel" class="panel hidden">
        <h2>News List (<span id="totalCount">0</span>)</h2>
        <div id="newsList"><div class="loading">Loading...</div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://tlmzcasltbihfbnupguq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsbXpjYXNsdGJpaGZibnVwZ3VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzQ5NTEsImV4cCI6MjA4OTk1MDk1MX0.ImMh9EDzX4TyKf0zxLLTcr8xcvtF3eUvPwhki2EOC3Q';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let fetchedData = null;

function showTab(tab){
    document.getElementById('addPanel').classList.add('hidden');
    document.getElementById('importPanel').classList.add('hidden');
    document.getElementById('listPanel').classList.add('hidden');
    document.querySelectorAll('.tab').forEach(btn=>btn.classList.remove('active'));
    if(tab==='add'){document.getElementById('addPanel').classList.remove('hidden');document.querySelectorAll('.tab')[0].classList.add('active');}
    if(tab==='import'){document.getElementById('importPanel').classList.remove('hidden');document.querySelectorAll('.tab')[1].classList.add('active');}
    if(tab==='list'){document.getElementById('listPanel').classList.remove('hidden');document.querySelectorAll('.tab')[2].classList.add('active');loadList();}
}

async function saveNews(){
    let title=document.getElementById('title').value.trim();
    let summary=document.getElementById('summary').value.trim();
    if(!title||!summary){alert('Title and Summary required');return;}
    let data={title,summary,content:document.getElementById('content').value.trim()||summary,category:document.getElementById('category').value.trim()||'Tech',image_url:document.getElementById('image_url').value.trim(),source:document.getElementById('source').value.trim()||'Myanmar Tech',reliability:document.getElementById('reliability').value};
    let {error}=await supabase.from('news').insert([data]);
    if(error)alert('Error: '+error.message);
    else{alert('Saved!');clearForm();loadList();}
}

function clearForm(){
    document.getElementById('title').value='';document.getElementById('summary').value='';document.getElementById('content').value='';
    document.getElementById('category').value='';document.getElementById('source').value='';document.getElementById('image_url').value='';
    document.getElementById('reliability').value='medium';
}

async function fetchNews(){
    let url=document.getElementById('newsUrl').value.trim();
    if(!url){alert('Enter URL');return;}
    document.getElementById('fetchLoading').classList.remove('hidden');
    document.getElementById('previewDiv').classList.add('hidden');
    try{
        let res=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
        let data=await res.json();
        let doc=new DOMParser().parseFromString(data.contents,'text/html');
        let title=doc.querySelector('meta[property="og:title"]')?.content||doc.querySelector('title')?.innerText||'No title';
        let desc=doc.querySelector('meta[property="og:description"]')?.content||doc.querySelector('meta[name="description"]')?.content||'No description';
        let img=doc.querySelector('meta[property="og:image"]')?.content||'';
        let source=new URL(url).hostname.replace('www.','');
        let cat='Tech';
        let txt=(title+desc).toLowerCase();
        if(txt.includes('5g'))cat='5G';
        else if(txt.includes('ai'))cat='AI';
        else if(txt.includes('mobile'))cat='Mobile';
        fetchedData={title:title.slice(0,200),summary:desc.slice(0,300),image_url:img,source,category:cat,reliability:'medium'};
        document.getElementById('previewDiv').innerHTML=`<strong>Title:</strong> ${title}<br><strong>Summary:</strong> ${desc}<br><strong>Category:</strong> ${cat}<br><strong>Source:</strong> ${source}${img?`<br><img src="${img}" style="max-width:100%;max-height:150px;margin-top:10px">`:''}<br><br><button class="btn-success" onclick="importNews()">Import</button>`;
        document.getElementById('previewDiv').classList.remove('hidden');
    }catch(e){alert('Failed');}
    finally{document.getElementById('fetchLoading').classList.add('hidden');}
}

async function importNews(){
    if(!fetchedData){alert('No data');return;}
    let {error}=await supabase.from('news').insert([{title:fetchedData.title,summary:fetchedData.summary,content:fetchedData.summary,category:fetchedData.category,image_url:fetchedData.image_url,source:fetchedData.source,reliability:fetchedData.reliability}]);
    if(error)alert('Error: '+error.message);
    else{alert('Imported!');document.getElementById('previewDiv').classList.add('hidden');document.getElementById('newsUrl').value='';fetchedData=null;loadList();}
}

async function loadList(){
    let {data}=await supabase.from('news').select('*').order('created_at',{ascending:false});
    document.getElementById('totalCount').innerText=data?.length||0;
    if(!data||data.length===0){document.getElementById('newsList').innerHTML='<div class="loading">No news</div>';return;}
    let html='<table><thead><tr><th>ID</th><th>Title</th><th>Category</th><th></th></tr></thead><tbody>';
    data.forEach(n=>{html+=`<tr><td>${n.id}</td><td>${escapeHtml(n.title)}</td><td>${escapeHtml(n.category||'-')}</td><td><button onclick="deleteNews(${n.id})" style="background:#ef4444;color:#fff;border:none;padding:5px10px;border-radius:5px">Delete</button></td></tr>`;});
    html+='</tbody></table>';
    document.getElementById('newsList').innerHTML=html;
}

async function deleteNews(id){
    if(!confirm('Delete?'))return;
    let {error}=await supabase.from('news').delete().eq('id',id);
    if(error)alert('Error');
    else{alert('Deleted');loadList();}
}

function escapeHtml(t){if(!t)return '';let d=document.createElement('div');d.textContent=t;return d.innerHTML;}

loadList();
</script>
</body>
</html>
