<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body{font-family:sans-serif;background:#f1f5f9;padding:20px}
        .card{background:white;border-radius:16px;padding:20px;margin-bottom:20px}
        input,textarea,select{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:8px}
        button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;margin-right:10px}
        .btn-blue{background:#3b82f6;color:white}
        .btn-red{background:#ef4444;color:white}
        .btn-green{background:#10b981;color:white}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #ddd}
        .tab{padding:10px 20px;background:#e2e8f0;border:none;border-radius:8px;margin-right:10px;cursor:pointer}
        .tab.active{background:#3b82f6;color:white}
        .tab-content{display:none}
        .tab-content.active{display:block}
    </style>
</head>
<body>
<div style="max-width:1200px;margin:0 auto">
    <div class="card" style="background:#0f172a;color:white">
        <h1>Admin Panel</h1>
        <a href="index.html" style="color:#3b82f6">Frontend</a>
    </div>
    
    <div>
        <button class="tab active" onclick="show('manual')">Manual</button>
        <button class="tab" onclick="show('auto')">Auto Import</button>
        <button class="tab" onclick="show('list')">News List</button>
    </div>
    
    <div id="manual" class="tab-content active">
        <div class="card">
            <h2>Add News</h2>
            <input type="text" id="title" placeholder="Title">
            <textarea id="summary" rows="2" placeholder="Summary"></textarea>
            <textarea id="content" rows="3" placeholder="Content"></textarea>
            <input type="text" id="category" placeholder="Category">
            <input type="text" id="source" placeholder="Source">
            <input type="text" id="image" placeholder="Image URL">
            <select id="reliability">
                <option value="high">High</option>
                <option value="medium" selected>Medium</option>
                <option value="low">Low</option>
            </select>
            <button class="btn-blue" onclick="save()">Save</button>
            <button onclick="clearForm()" style="background:#64748b;color:white">Clear</button>
        </div>
    </div>
    
    <div id="auto" class="tab-content">
        <div class="card">
            <h2>Auto Import</h2>
            <input type="url" id="url" placeholder="https://...">
            <button class="btn-blue" onclick="fetchUrl()">Fetch</button>
            <div id="preview" style="display:none;margin-top:15px;padding:15px;background:#f8fafc;border-radius:12px"></div>
            <div id="loading" style="display:none">Loading...</div>
        </div>
    </div>
    
    <div id="list" class="tab-content">
        <div class="card">
            <h2>News List (<span id="count">0</span>)</h2>
            <div id="listContainer">Loading...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
    'https://tlmzcasltbihfbnupguq.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsbXpjYXNsdGJpaGZibnVwZ3VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzQ5NTEsImV4cCI6MjA4OTk1MDk1MX0.ImMh9EDzX4TyKf0zxLLTcr8xcvtF3eUvPwhki2EOC3Q'
);
let imported = null;

function show(tab){
    document.getElementById('manual').classList.remove('active');
    document.getElementById('auto').classList.remove('active');
    document.getElementById('list').classList.remove('active');
    document.querySelectorAll('.tab').forEach(btn=>btn.classList.remove('active'));
    if(tab==='manual'){document.getElementById('manual').classList.add('active');document.querySelectorAll('.tab')[0].classList.add('active');}
    if(tab==='auto'){document.getElementById('auto').classList.add('active');document.querySelectorAll('.tab')[1].classList.add('active');}
    if(tab==='list'){document.getElementById('list').classList.add('active');document.querySelectorAll('.tab')[2].classList.add('active');loadList();}
}

async function loadList(){
    let {data}=await supabase.from('news').select('*').order('created_at',{ascending:false});
    document.getElementById('count').innerText=data?.length||0;
    if(!data||data.length===0){document.getElementById('listContainer').innerHTML='No news';return;}
    let html='<table><thead><tr><th>ID</th><th>Title</th><th>Category</th><th></th></tr></thead><tbody>';
    data.forEach(n=>{html+=`<tr><td>${n.id}</td><td>${n.title}</td><td>${n.category||'-'}</td><td><button onclick="del(${n.id})" style="background:#ef4444;color:white;border:none;padding:5px 10px;border-radius:5px">Delete</button></td></tr>`;});
    html+='</tbody></table>';
    document.getElementById('listContainer').innerHTML=html;
}

async function save(){
    let title=document.getElementById('title').value.trim();
    let summary=document.getElementById('summary').value.trim();
    if(!title||!summary){alert('Title and summary required');return;}
    let data={
        title,summary,
        content:document.getElementById('content').value.trim()||summary,
        category:document.getElementById('category').value.trim()||'Tech',
        image_url:document.getElementById('image').value.trim(),
        source:document.getElementById('source').value.trim()||'Myanmar Tech',
        reliability:document.getElementById('reliability').value
    };
    let {error}=await supabase.from('news').insert([data]);
    if(error){alert(error.message);return;}
    alert('Saved!');
    clearForm();
    loadList();
}

function clearForm(){
    document.getElementById('title').value='';
    document.getElementById('summary').value='';
    document.getElementById('content').value='';
    document.getElementById('category').value='';
    document.getElementById('source').value='';
    document.getElementById('image').value='';
    document.getElementById('reliability').value='medium';
}

async function fetchUrl(){
    let url=document.getElementById('url').value.trim();
    if(!url){alert('Enter URL');return;}
    document.getElementById('loading').style.display='block';
    document.getElementById('preview').style.display='none';
    try{
        let res=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));
        let data=await res.json();
        let doc=new DOMParser().parseFromString(data.contents,'text/html');
        let title=doc.querySelector('meta[property="og:title"]')?.content||doc.querySelector('title')?.innerText||'No title';
        let desc=doc.querySelector('meta[property="og:description"]')?.content||doc.querySelector('meta[name="description"]')?.content||'No description';
        let img=doc.querySelector('meta[property="og:image"]')?.content||'';
        let source=new URL(url).hostname.replace('www.','');
        let cat='Tech';
        let txt=(title+desc).toLowerCase();
        if(txt.includes('5g')) cat='5G';
        else if(txt.includes('ai')) cat='AI';
        else if(txt.includes('mobile')) cat='Mobile';
        imported={title:title.slice(0,200),summary:desc.slice(0,300),image_url:img,source,category:cat,reliability:'medium'};
        document.getElementById('preview').innerHTML=`<strong>Title:</strong> ${title}<br><strong>Summary:</strong> ${desc}<br><strong>Category:</strong> ${cat}<br><strong>Source:</strong> ${source}${img?`<br><img src="${img}" style="max-width:100%;max-height:150px;margin-top:10px">`:''}<br><br><button class="btn-green" onclick="importNews()">Import to Supabase</button>`;
        document.getElementById('preview').style.display='block';
    }catch(e){alert('Failed to fetch');}
    finally{document.getElementById('loading').style.display='none';}
}

async function importNews(){
    if(!imported){alert('No data');return;}
    let {error}=await supabase.from('news').insert([{
        title:imported.title,summary:imported.summary,content:imported.summary,
        category:imported.category,image_url:imported.image_url,
        source:imported.source,reliability:imported.reliability
    }]);
    if(error){alert(error.message);return;}
    alert('Imported!');
    document.getElementById('preview').style.display='none';
    document.getElementById('url').value='';
    imported=null;
    loadList();
}

async function del(id){
    if(!confirm('Delete?'))return;
    let {error}=await supabase.from('news').delete().eq('id',id);
    if(error){alert(error.message);return;}
    alert('Deleted');
    loadList();
}

loadList();
</script>
</body>
</html>
