<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာနည်းပညာသတင်း</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container"><h1>🇲🇲 မြန်မာနည်းပညာသတင်း</h1></div>
    </nav>
    <section class="hero">
        <div class="container">
            <h1>✨ နည်းပညာသတင်းများ ✨</h1>
            <p>Supabase နှင့် ချိတ်ဆက်ထားသော နောက်ဆုံးရသတင်းစုံ</p>
        </div>
        <div class="category-filter" style="margin-bottom: 20px; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;">
    <button onclick="filterByCategory('အားလုံး')" class="cat-btn">အားလုံး</button>
    <button onclick="filterByCategory('နိုင်ငံတကာ')" class="cat-btn">နိုင်ငံတကာ</button>
    <button onclick="filterByCategory('ပြည်တွင်း')" class="cat-btn">ပြည်တွင်း</button>
    <button onclick="filterByCategory('ဖုန်း')" class="cat-btn">ဖုန်း</button>
    <button onclick="filterByCategory('AI')" class="cat-btn">AI</button>
    <button onclick="filterByCategory('စျေးနှုန်း')" class="cat-btn">ရွှေ/ငွေစျေး</button>
</div>

<style>
    .cat-btn {
        background: white; border: 1px solid #3b82f6; color: #3b82f6;
        padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap;
    }
    .cat-btn:hover, .cat-btn.active { background: #3b82f6; color: white; }
</style>
    </section>
    <div class="section container">
        <input type="text" id="searchInput" placeholder="🔎 သတင်းရှာဖွေရန်..." class="search-input">
        <div class="results-grid" id="searchResults">
            <p>သတင်းများ ဆွဲတင်နေသည်...</p>
        </div>
    </div>
    <!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- ကိုယ့် JavaScript ဖိုင် -->
<script src="script.js"></script>
</body>
</html>
